kind = "web"
previewPath = "/sms-dashboard/"
title = "SMS Gateway"
version = "1.0.0"
id = "artifacts/sms-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/sms-dashboard/" ]
localPort = 21002

[services.development]
run = "pnpm --filter @workspace/sms-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sms-dashboard", "run", "build" ]
publicDir = "artifacts/sms-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21002"
BASE_PATH = "/sms-dashboard/"
